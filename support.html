<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Alfateh Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- iOS Safari PWA Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alfateh Ledger">
<link rel="apple-touch-icon" href="icon.png">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
        }
        .premium-card { 
            background: #ffffff; 
            border: 1px solid #f1f5f9; 
            border-radius: 2.5rem; 
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); 
        }
        .input-field {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: #000000;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
        }
        .wa-gradient {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-2xl mx-auto px-6 py-12 md:py-20">
        <!-- Navigation -->
        <div class="flex justify-between items-center mb-12">
            <a href="index.html" class="w-12 h-12 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-slate-900 hover:shadow-md transition-all active:scale-90">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </a>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Support Center</span>
        </div>

        <header class="mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4">How can we help?</h1>
            <p class="text-slate-500 font-medium leading-relaxed">Experience premium support. Reach out via WhatsApp for instant assistance or leave a detailed report below.</p>
        </header>

        <!-- WhatsApp Hero -->
        <a href="https://wa.me/923285950885" class="premium-card p-8 mb-8 flex items-center justify-between group hover:border-emerald-100 transition-all cursor-pointer">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-3xl wa-gradient flex items-center justify-center text-white text-2xl shadow-lg shadow-emerald-500/20 group-hover:scale-105 transition-transform">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-900">Priority Chat</h3>
                    <p class="text-sm text-slate-500 font-medium">Connect directly on WhatsApp</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 group-hover:text-emerald-500 group-hover:bg-emerald-50 transition-all">
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </div>
        </a>

        <!-- Feedback Section -->
        <div class="premium-card p-8 md:p-10">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-8 bg-black rounded-full"></div>
                <h3 class="text-xl font-bold text-slate-900">System Report</h3>
            </div>

            <!-- Integrated Formspree -->
            <form id="supportForm" action="https://formspree.io/f/xgorbeaz" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-3 ml-1">Full Name</label>
                        <input type="text" name="name" required placeholder="Name" 
                            class="input-field w-full p-4 rounded-2xl outline-none font-semibold text-slate-900 placeholder:text-slate-300">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-3 ml-1">Email Address</label>
                        <input type="email" name="email" required placeholder="hello@example.com" 
                            class="input-field w-full p-4 rounded-2xl outline-none font-semibold text-slate-900 placeholder:text-slate-300">
                    </div>
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-3 ml-1">Message</label>
                    <textarea name="message" rows="5" required placeholder="Describe your issue or feedback..." 
                        class="input-field w-full p-4 rounded-2xl outline-none font-semibold text-slate-900 placeholder:text-slate-300 resize-none"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-black text-white font-bold rounded-2xl hover:bg-slate-800 transition-all active:scale-[0.98] shadow-xl shadow-black/10">
                    Send Report
                </button>
            </form>

            <div id="status" class="hidden mt-6 p-4 rounded-2xl text-center font-bold text-sm border"></div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Alfateh Ledger Premium Support</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('supportForm');
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = new FormData(e.target);
            
            btn.disabled = true;
            btn.innerText = "Sending...";
            btn.style.opacity = "0.5";

            try {
                const response = await fetch(e.target.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> Report submitted successfully.';
                    status.className = "mt-6 p-4 rounded-2xl bg-emerald-50 text-emerald-600 text-center font-bold text-sm border border-emerald-100";
                    form.reset();
                } else {
                    throw new Error();
                }
            } catch (error) {
                status.innerHTML = '<i class="fa-solid fa-circle-xmark mr-2"></i> Oops! Something went wrong.';
                status.className = "mt-6 p-4 rounded-2xl bg-rose-50 text-rose-600 text-center font-bold text-sm border border-rose-100";
            } finally {
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Send Report";
                btn.style.opacity = "1";
                setTimeout(() => status.classList.add('hidden'), 5000);
            }
        });
    </script>
</body>
</html>
